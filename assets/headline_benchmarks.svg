<text x="40" y="537" font-size="11" fill="#94a3b8">Every bar is decode t/s (tokens/s while generating) vs that system&#8217;s own baseline engine. prefill &amp; total are in the README&#8217;s full table. Full sweep: benchmark/.</text>
<text x="40" y="553" font-size="11" fill="#94a3b8">Baselines: llama.cpp commits d05fe1d (Pi 5, M1 Max) / b9827 (x86); bitnet.cpp = microsoft/BitNet master (its bundled llama.cpp fork, unpinned).</text>
