name: Home Assistant app

on:
  pull_request:
    paths:
      - "home-assistant-apps/geist/**"
      - "repository.yaml"
      - ".github/workflows/ha-app.yml"
  push:
    branches: [main]
    paths:
      - "home-assistant-apps/geist/**"
      - "repository.yaml"
      - ".github/workflows/ha-app.yml"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64
            platform: linux/arm64
          - arch: amd64
            platform: linux/amd64
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: home-assistant-apps/geist
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            BUILD_ARCH=${{ matrix.arch }}
            BUILD_VERSION=0.1.0
          outputs: type=oci,dest=/tmp/geist-${{ matrix.arch }}.tar
