name: Release

# Build self-contained per-platform `geist` CLI artifacts (ROADMAP.md Step 4).
# Ships macos-arm64, linux-arm64 and linux-x86_64 (AVX-512) — all dependency-free
# static/self-contained builds. Windows still waits. Runs on a version tag, or
# manually for a dry run (artifacts upload either way; a tag also attaches them
# to the Release).
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      embed_model_url:
        description: 'GGUF URL to bake into the single-file `geist-<platform>-embedded` artifact (<~1.5 GB). Empty = the default below (BitNet b1.58 2B-4T).'
        required: false
        default: ''

permissions:
  contents: write   # attach assets to the GitHub Release on a tag

# Single-binary build: every release ALSO ships a `geist-<platform>-embedded`
# artifact — the model baked in (.incbin, zero-copy), so it runs with no model
# argument (`./geist "prompt"`). The model-less CLI still ships unchanged
# alongside it. URL source, first non-empty wins: the workflow_dispatch input,
# the repo variable EMBED_MODEL_URL (Settings -> Variables), else the default
# below. The GGUF must carry its own tokenizer (gpt2-BPE / SPM / unigram) — see
# the Makefile EMBED note. To stop shipping embedded, clear the default here.
env:
  EMBED_MODEL_URL: ${{ inputs.embed_model_url || vars.EMBED_MODEL_URL || 'https://huggingface.co/microsoft/bitnet-b1.58-2B-4T-gguf/resolve/main/ggml-model-i2_s.gguf' }}

jobs:
  # Refuse to publish a release whose binary would print a different version than
  # the tag, or that has no CHANGELOG entry. Source of truth: include/geist.h.
  version-guard:
    name: tag == geist.h version, CHANGELOG entry exists
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - name: Assert tag matches GEIST_VERSION_STRING and has a CHANGELOG section
        run: |
          hdr=$(sed -n 's/.*GEIST_VERSION_STRING "\([0-9][0-9.]*\)".*/\1/p' include/geist.h | head -1)
          tag="${GITHUB_REF_NAME#v}"
          echo "geist.h=$hdr  tag=$tag"
          test "$hdr" = "$tag" || { echo "::error::include/geist.h version $hdr != tag $tag — bump include/geist.h"; exit 1; }
          grep -q "^## \[$tag\]" CHANGELOG.md || { echo "::error::no '## [$tag]' section in CHANGELOG.md"; exit 1; }
          sh scripts/check-version.sh

  linux-arm64:
    name: linux-arm64 (musl-static, dependency-free)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      # Build fully static against **musl** (not glibc): the result has literally
      # no libc dependency, is more portable than a glibc -static binary (no NSS /
      # glibc-version quirks), and is much smaller. Alpine 3.21 ships gcc 14
      # (needed for -std=c23) and a musl-built libgomp for OpenMP. The host job
      # stays on ubuntu-arm so checkout / upload-artifact (Node actions) work;
      # only the compile runs in the container, writing into the mounted volume.
      # GEMM_PROVIDER=native -> native NEON fp32 + vendored FFT (no OpenBLAS/FFTW).
      # EXTRA_LDFLAGS "-static -s": fully static + strip symbols at link time.
      - name: Build (musl-static in Alpine, stripped)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            make TARGET=linux CC=gcc GEMM_PROVIDER=native \
                 EXTRA_CFLAGS=-D_GNU_SOURCE EXTRA_LDFLAGS="-static -s" \
                 bin/linux/release/tools/geist
          '
      - name: Verify self-contained + runs
        run: |
          file bin/linux/release/tools/geist
          ldd bin/linux/release/tools/geist || echo "(static: not a dynamic executable — good)"
          bin/linux/release/tools/geist --version
          ls -l bin/linux/release/tools/geist
      - name: Package
        run: |
          mkdir -p dist/geist-linux-arm64
          cp bin/linux/release/tools/geist dist/geist-linux-arm64/
          cp README.md LICENSE dist/geist-linux-arm64/
          tar -C dist -czf geist-linux-arm64.tar.gz geist-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: geist-linux-arm64
          path: geist-linux-arm64.tar.gz

      # libgeist SDK artifact (see the x86_64 job for rationale): static lib +
      # headers, built with the same musl/native recipe, smoke-linked against the
      # packaged artifact. (geistlib#91)
      - name: Build + smoke + package libgeist SDK
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            make TARGET=linux CC=gcc GEMM_PROVIDER=native EXTRA_CFLAGS=-D_GNU_SOURCE lib
            mkdir -p dist/libgeist-linux-arm64/include
            cp lib/linux/release/libgeist.a dist/libgeist-linux-arm64/
            cp include/*.h dist/libgeist-linux-arm64/include/
            cp tools/agent.h tools/agent_main.h tools/dynamic_request_v1.h tools/dynamic_arguments_v1.h tools/dynamic_tools_v1.h tools/dynamic_host_v1.h tools/json_schema_v1.h dist/libgeist-linux-arm64/include/
            cp LICENSE dist/libgeist-linux-arm64/
            d=dist/libgeist-linux-arm64
            cc -std=c23 -I "$d/include" examples/embed_smoke.c "$d/libgeist.a" -lm -o /tmp/sdk_smoke
            /tmp/sdk_smoke
            cc -std=c23 -I "$d/include" examples/embed_agent_smoke.c "$d/libgeist.a" -lm -o /tmp/agent_smoke
            /tmp/agent_smoke
          '
          tar -C dist -czf libgeist-linux-arm64.tar.gz libgeist-linux-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: libgeist-linux-arm64
          path: libgeist-linux-arm64.tar.gz

      # Optional: a second binary with the model baked in (.incbin, zero-copy).
      # rm geist.o first — the plain build above compiled it without
      # -DGEIST_EMBEDDED_MODEL and make doesn't track that flag flip.
      - name: Build + package embedded (if EMBED_MODEL_URL set)
        if: env.EMBED_MODEL_URL != ''
        run: |
          curl -fL --retry 5 --retry-delay 15 --retry-all-errors -o embed-model.gguf "$EMBED_MODEL_URL"
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            rm -f build/linux/release/tools/geist.o
            make TARGET=linux CC=gcc GEMM_PROVIDER=native \
                 EXTRA_CFLAGS=-D_GNU_SOURCE EXTRA_LDFLAGS="-static -s" \
                 EMBED_MODEL=embed-model.gguf bin/linux/release/tools/geist
          '
          file bin/linux/release/tools/geist
          bin/linux/release/tools/geist --version
          ls -l bin/linux/release/tools/geist
          mkdir -p dist/geist-bitnet-linux-arm64
          cp bin/linux/release/tools/geist dist/geist-bitnet-linux-arm64/geist-bitnet
          cp README.md LICENSE dist/geist-bitnet-linux-arm64/
          tar -C dist -czf geist-bitnet-linux-arm64.tar.gz geist-bitnet-linux-arm64
      # dynamic-tools-v1 health handshake against the shipped embedded artifact
      # (see the x86_64 job for rationale). Proves --serve answers the protocol
      # with the documented ready frame on aarch64 (geistlib#87).
      - name: Health-handshake smoke (embedded --serve)
        if: env.EMBED_MODEL_URL != ''
        run: |
          sock="$RUNNER_TEMP/geist-health.sock"
          ./bin/linux/release/tools/geist --serve "$sock" &
          pid=$!
          for _ in $(seq 1 120); do [ -S "$sock" ] && break; sleep 1; done
          [ -S "$sock" ] || { echo "::error::--serve socket never appeared"; kill "$pid" 2>/dev/null || true; exit 1; }
          python3 -c '
          import socket, sys
          s = socket.socket(socket.AF_UNIX); s.settimeout(30); s.connect(sys.argv[1])
          s.sendall(b"{\"type\":\"health\"}\n")
          r = s.recv(4096).decode()
          print("health reply:", r.strip())
          assert "\"protocol\":\"dynamic-tools-v1\"" in r and "\"status\":\"ready\"" in r, "unexpected health reply: " + r
          print("health handshake OK")
          ' "$sock"
          rc=$?
          kill "$pid" 2>/dev/null || true
          exit $rc
      - uses: actions/upload-artifact@v4
        if: env.EMBED_MODEL_URL != ''
        with:
          name: geist-bitnet-linux-arm64
          path: geist-bitnet-linux-arm64.tar.gz
  linux-x86_64:
    name: linux-x86_64 (musl-static, AVX-512, dependency-free)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      # Same musl-static recipe as arm64, on x86_64. BACKENDS="cpu_x86 cpu_scalar"
      # turns on the native AVX-512/VNNI backend (x86_64 still defaults to
      # cpu_scalar). Baseline is x86-64-v3 (Haswell / Zen+: AVX2+FMA) with the
      # AVX-512 kernels compiled per-TU and runtime-dispatched via hw_probe — so the
      # one binary runs on any x86-64-v3 CPU and uses AVX-512 only where present (no
      # SIGILL). GEMM_PROVIDER=native -> BLAS-free (portable scalar fp32 for the
      # vision/audio dense path; the quantized text kernels never touch BLAS).
      # Ships two artifacts (like arm64): the model-less engine below, and — when
      # EMBED_MODEL_URL is set (defaults to BitNet) — an embedded geist-bitnet-linux-
      # x86_64 single-file. BitNet I2_S now has native x86 kernels (beats bitnet.cpp
      # on Zen 5), so the baked-in BitNet runs fast on x86 too.
      - name: Build (musl-static in Alpine, stripped)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            make TARGET=linux CC=gcc BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native \
                 EXTRA_CFLAGS=-D_GNU_SOURCE EXTRA_LDFLAGS="-static -s" \
                 bin/linux/release/tools/geist
          '
      - name: Verify self-contained + runs
        run: |
          file bin/linux/release/tools/geist
          ldd bin/linux/release/tools/geist || echo "(static: not a dynamic executable — good)"
          bin/linux/release/tools/geist --version
          ls -l bin/linux/release/tools/geist
      - name: Package
        run: |
          mkdir -p dist/geist-linux-x86_64
          cp bin/linux/release/tools/geist dist/geist-linux-x86_64/
          cp README.md LICENSE dist/geist-linux-x86_64/
          tar -C dist -czf geist-linux-x86_64.tar.gz geist-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: geist-linux-x86_64
          path: geist-linux-x86_64.tar.gz

      # libgeist SDK artifact: the static lib + public headers for in-process
      # embedders (secondary to the runtime; never a downloadable app). Built with
      # the same musl/backends recipe as the binary above, then a model-free smoke
      # (examples/embed_smoke.c) links ONLY against the packaged headers+archive to
      # prove the artifact is self-consistent. (geistlib#91)
      - name: Build + smoke + package libgeist SDK
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            make TARGET=linux CC=gcc BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native EXTRA_CFLAGS=-D_GNU_SOURCE lib
            mkdir -p dist/libgeist-linux-x86_64/include
            cp lib/linux/release/libgeist.a dist/libgeist-linux-x86_64/
            cp include/*.h dist/libgeist-linux-x86_64/include/
            cp tools/agent.h tools/agent_main.h tools/dynamic_request_v1.h tools/dynamic_arguments_v1.h tools/dynamic_tools_v1.h tools/dynamic_host_v1.h tools/json_schema_v1.h dist/libgeist-linux-x86_64/include/
            cp LICENSE dist/libgeist-linux-x86_64/
            d=dist/libgeist-linux-x86_64
            cc -std=c23 -I "$d/include" examples/embed_smoke.c "$d/libgeist.a" -lm -o /tmp/sdk_smoke
            /tmp/sdk_smoke
            cc -std=c23 -I "$d/include" examples/embed_agent_smoke.c "$d/libgeist.a" -lm -o /tmp/agent_smoke
            /tmp/agent_smoke
          '
          tar -C dist -czf libgeist-linux-x86_64.tar.gz libgeist-linux-x86_64
      - uses: actions/upload-artifact@v4
        with:
          name: libgeist-linux-x86_64
          path: libgeist-linux-x86_64.tar.gz

      # Optional: a second binary with BitNet baked in (.incbin, zero-copy) — now
      # that the x86 I2_S kernels make ternary fast on x86. rm geist.o first (the
      # plain build above compiled it without -DGEIST_EMBEDDED_MODEL).
      - name: Build + package embedded (if EMBED_MODEL_URL set)
        if: env.EMBED_MODEL_URL != ''
        run: |
          curl -fL --retry 5 --retry-delay 15 --retry-all-errors -o embed-model.gguf "$EMBED_MODEL_URL"
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers
            rm -f build/linux/release/tools/geist.o
            make TARGET=linux CC=gcc BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native \
                 EXTRA_CFLAGS=-D_GNU_SOURCE EXTRA_LDFLAGS="-static -s" \
                 EMBED_MODEL=embed-model.gguf bin/linux/release/tools/geist
          '
          file bin/linux/release/tools/geist
          bin/linux/release/tools/geist --version
          ls -l bin/linux/release/tools/geist
          mkdir -p dist/geist-bitnet-linux-x86_64
          cp bin/linux/release/tools/geist dist/geist-bitnet-linux-x86_64/geist-bitnet
          cp README.md LICENSE dist/geist-bitnet-linux-x86_64/
          tar -C dist -czf geist-bitnet-linux-x86_64.tar.gz geist-bitnet-linux-x86_64
      # dynamic-tools-v1 health handshake against the shipped embedded artifact:
      # start --serve (internal model), send {"type":"health"}, require the
      # documented ready frame, shut down. Proves the runtime artifact answers the
      # protocol on this arch (geistlib#87). Correctness is also unit-tested
      # (test_dynamic_host_v1_unit); this exercises the real binary.
      - name: Health-handshake smoke (embedded --serve)
        if: env.EMBED_MODEL_URL != ''
        run: |
          sock="$RUNNER_TEMP/geist-health.sock"
          ./bin/linux/release/tools/geist --serve "$sock" &
          pid=$!
          for _ in $(seq 1 120); do [ -S "$sock" ] && break; sleep 1; done
          [ -S "$sock" ] || { echo "::error::--serve socket never appeared"; kill "$pid" 2>/dev/null || true; exit 1; }
          python3 -c '
          import socket, sys
          s = socket.socket(socket.AF_UNIX); s.settimeout(30); s.connect(sys.argv[1])
          s.sendall(b"{\"type\":\"health\"}\n")
          r = s.recv(4096).decode()
          print("health reply:", r.strip())
          assert "\"protocol\":\"dynamic-tools-v1\"" in r and "\"status\":\"ready\"" in r, "unexpected health reply: " + r
          print("health handshake OK")
          ' "$sock"
          rc=$?
          kill "$pid" 2>/dev/null || true
          exit $rc
      - uses: actions/upload-artifact@v4
        if: env.EMBED_MODEL_URL != ''
        with:
          name: geist-bitnet-linux-x86_64
          path: geist-bitnet-linux-x86_64.tar.gz
  macos-arm64:
    name: macos-arm64 (Accelerate/AMX)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install libomp
        run: brew install libomp
      # GEIST_STATIC_OMP=1 -> static libomp.a, so the binary depends only on
      # macOS system frameworks (Accelerate/libSystem, always present). macOS
      # cannot be fully static (Apple ships no static libSystem), so we strip
      # symbols post-link instead of -s (which macOS ld no longer supports).
      - name: Build
        run: make TARGET=mac-omp CC=clang GEIST_STATIC_OMP=1 bin/mac-omp/release/tools/geist
      - name: Strip symbols
        run: strip bin/mac-omp/release/tools/geist
      - name: Verify deps + runs
        run: |
          otool -L bin/mac-omp/release/tools/geist
          bin/mac-omp/release/tools/geist --version
          ls -l bin/mac-omp/release/tools/geist
      - name: Package
        run: |
          mkdir -p dist/geist-macos-arm64
          cp bin/mac-omp/release/tools/geist dist/geist-macos-arm64/
          cp README.md LICENSE dist/geist-macos-arm64/
          tar -C dist -czf geist-macos-arm64.tar.gz geist-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: geist-macos-arm64
          path: geist-macos-arm64.tar.gz

      # libgeist SDK artifact (see the x86_64 job for rationale): static lib +
      # headers, built with the same mac recipe, smoke-linked against the packaged
      # artifact. (geistlib#91)
      - name: Build + smoke + package libgeist SDK
        run: |
          make TARGET=mac-omp CC=clang GEIST_STATIC_OMP=1 lib
          mkdir -p dist/libgeist-macos-arm64/include
          cp lib/mac-omp/release/libgeist.a dist/libgeist-macos-arm64/
          cp include/*.h dist/libgeist-macos-arm64/include/
          cp tools/agent.h tools/agent_main.h tools/dynamic_request_v1.h tools/dynamic_arguments_v1.h tools/dynamic_tools_v1.h tools/dynamic_host_v1.h tools/json_schema_v1.h dist/libgeist-macos-arm64/include/
          cp LICENSE dist/libgeist-macos-arm64/
          d=dist/libgeist-macos-arm64
          cc -std=c23 -I "$d/include" examples/embed_smoke.c "$d/libgeist.a" -lm -o /tmp/sdk_smoke
          /tmp/sdk_smoke
          cc -std=c23 -I "$d/include" examples/embed_agent_smoke.c "$d/libgeist.a" -lm -o /tmp/agent_smoke
          /tmp/agent_smoke
          tar -C dist -czf libgeist-macos-arm64.tar.gz libgeist-macos-arm64
      - uses: actions/upload-artifact@v4
        with:
          name: libgeist-macos-arm64
          path: libgeist-macos-arm64.tar.gz

      # Optional: a second binary with the model baked in. rm geist.o first (the
      # plain build compiled it without -DGEIST_EMBEDDED_MODEL; make won't notice).
      - name: Build + package embedded (if EMBED_MODEL_URL set)
        if: env.EMBED_MODEL_URL != ''
        run: |
          curl -fL --retry 5 --retry-delay 15 --retry-all-errors -o embed-model.gguf "$EMBED_MODEL_URL"
          rm -f build/mac-omp/release/tools/geist.o
          make TARGET=mac-omp CC=clang GEIST_STATIC_OMP=1 \
               EMBED_MODEL=embed-model.gguf bin/mac-omp/release/tools/geist
          strip bin/mac-omp/release/tools/geist
          otool -L bin/mac-omp/release/tools/geist
          bin/mac-omp/release/tools/geist --version
          ls -l bin/mac-omp/release/tools/geist
          mkdir -p dist/geist-bitnet-macos-arm64
          cp bin/mac-omp/release/tools/geist dist/geist-bitnet-macos-arm64/geist-bitnet
          cp README.md LICENSE dist/geist-bitnet-macos-arm64/
          tar -C dist -czf geist-bitnet-macos-arm64.tar.gz geist-bitnet-macos-arm64
      - uses: actions/upload-artifact@v4
        if: env.EMBED_MODEL_URL != ''
        with:
          name: geist-bitnet-macos-arm64
          path: geist-bitnet-macos-arm64.tar.gz
  release:
    name: attach artifacts to the Release
    needs: [version-guard, linux-arm64, linux-x86_64, macos-arm64]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Publish to the GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        # `gh release upload` needs the Release to already exist; a pushed tag
        # alone is not a Release. Create it from the tag (auto-generated notes)
        # if absent, then attach the per-platform tarballs. Idempotent.
        run: |
          find dist -name '*.tar.gz' -type f -exec sha256sum {} \; | \
            sed 's#  dist/[^/]*/#  #' | sort -k2 > SHA256SUMS
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 \
            || gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" \
                 --title "geist ${GITHUB_REF_NAME}" --generate-notes --verify-tag
          gh release upload "${GITHUB_REF_NAME}" SHA256SUMS dist/*/*.tar.gz \
            --repo "${GITHUB_REPOSITORY}" --clobber

  # Keep `brew install geisten/tap/geist` current: render Formula/geist.rb from
  # the fresh tarball checksums (scripts/make-brew-formula.sh) and push it to
  # geisten/homebrew-tap. Auth: TAP_DEPLOY_KEY secret = private half of a deploy
  # key whose public half has write access on the tap repo (nothing else).
  homebrew:
    name: update geisten/homebrew-tap
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Render formula and push to the tap
        env:
          TAP_DEPLOY_KEY: ${{ secrets.TAP_DEPLOY_KEY }}
        run: |
          test -n "$TAP_DEPLOY_KEY" || { echo "::error::secret TAP_DEPLOY_KEY missing — deploy key for geisten/homebrew-tap (see scripts/make-brew-formula.sh)"; exit 1; }
          V="${GITHUB_REF_NAME#v}"
          sha() { sha256sum "dist/$1/$1.tar.gz" | cut -d' ' -f1; }
          mkdir -p ~/.ssh
          printf '%s\n' "$TAP_DEPLOY_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          git clone --depth 1 git@github.com:geisten/homebrew-tap.git tap
          scripts/make-brew-formula.sh "$V" \
            "$(sha geist-macos-arm64)" "$(sha geist-linux-arm64)" "$(sha geist-linux-x86_64)" \
            > tap/Formula/geist.rb
          cd tap
          git diff --quiet && { echo "formula already at $V — nothing to push"; exit 0; }
          git -c user.name="github-actions[bot]" \
              -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
              commit -am "geist $V"
          git push
