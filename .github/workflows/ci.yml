name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  version-consistency:
    name: version strings agree (geist.h == README)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: sh scripts/check-version.sh

  build-test:
    name: build + unit tests (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    # ccache turns the recompile of ~38k lines into a near-no-op on a cache hit,
    # so each push only rebuilds what changed. Content-based (hashes the source),
    # unlike caching make's mtime-driven build/ dir.
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    strategy:
      fail-fast: false
      matrix:
        include:
          # -std=c23 needs gcc >= 14 and Apple-clang >= 16 (Xcode 16 / macOS 15).
          - name: macOS arm64
            runner: macos-15
            target: mac-omp
            cc: clang
          - name: Linux arm64
            runner: ubuntu-24.04-arm
            target: linux
            cc: gcc-14
    steps:
      - uses: actions/checkout@v4

      # Unique key each run so the warmed cache is always saved; restore-keys
      # falls back to the latest prior cache for this matrix leg.
      - name: ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-${{ matrix.name }}-${{ github.run_id }}
          restore-keys: ccache-${{ matrix.name }}-

      - name: Install deps (macOS)
        if: runner.os == 'macOS'
        run: brew install libomp ccache

      - name: Install deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-14 libopenblas-dev ccache

      - name: Build
        run: make TARGET=${{ matrix.target }} CC="ccache ${{ matrix.cc }}"

      # Unit tests are hardware/kernel-level and do not need a GGUF model;
      # AUTO_FETCH_MODEL=0 keeps the ~3 GB reference download out of CI.
      - name: Unit tests
        run: make test-unit TARGET=${{ matrix.target }} CC="ccache ${{ matrix.cc }}" AUTO_FETCH_MODEL=0

      # The integration + e2e suites load the real GGUF, so they actually exercise
      # the product path (forward pass, tokenizer, KV, the agent/chat loops) — the
      # unit suite cannot. Run them on Linux only and cache the ~3 GB model so it
      # downloads once; asset-gated tests (vision/audio/safetensors refs) SKIP.
      - name: Cache reference model
        if: matrix.target == 'linux'
        uses: actions/cache@v4
        with:
          path: gguf_artifacts
          key: geist-model-gemma4-e2b-q4km-v1

      - name: Integration + e2e tests (real model)
        if: matrix.target == 'linux'
        run: make test-int test-e2e TARGET=${{ matrix.target }} CC="ccache ${{ matrix.cc }}"

      # Coarse Q4_K perf-regression gate on the (noisy) shared runner: generous
      # floors catch a cliff — scalar fallback, -O0, OpenMP off, an early-return
      # kernel — not subtle drift. The Pi 5 stays the precise arbiter. Floors are
      # conservative; tighten toward ~60% of the runner's real numbers once the
      # log shows them. Reuses the model already built + cached above.
      - name: Perf regression gate (Q4_K)
        if: matrix.target == 'linux'
        run: |
          bin/${{ matrix.target }}/release/tests/bench_perf_sweep \
            --gguf gguf_artifacts/gemma4-e2b-Q4_K_M.gguf \
            --seq-lens 128 --decode-n 16 --warmup 4 --repeats 3 \
            | python3 benchmark/perf_gate.py --min-prefill 20 --min-decode 4

      # Quality gate: self-contained tool-calling/JSON probes (no dataset),
      # greedy/deterministic. Fails if (JSON schema-correct + func fully-correct)
      # / total drops below the floor — catches a quant/sampling/kernel change
      # that degrades structured output. Floor 0.70 (local baseline ~0.89); the
      # first run prints the runner's rate so it can be tuned.
      - name: Quality gate (tool-calling)
        if: matrix.target == 'linux'
        run: make bench-tooling TOOLING_MIN=0.7 TARGET=${{ matrix.target }} CC="ccache ${{ matrix.cc }}"

      - name: Build example
        run: make -C examples TARGET=${{ matrix.target }} CC="ccache ${{ matrix.cc }}"

  # Test what we ship: the release artifact is a musl-static binary (release.yml),
  # but the matrix above only exercises glibc. musl gates POSIX symbols behind the
  # same feature macros and differs in some libc behaviour, so build+run on musl
  # too — catching musl-specific issues before they reach geisten.net. Mirrors the
  # release build flags (GEMM_PROVIDER=native + -D_GNU_SOURCE) and adds the tests.
  build-test-musl:
    name: build + unit tests (Linux arm64, musl)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - name: Build + unit tests (musl in Alpine)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers bash
            FLAGS="TARGET=linux CC=gcc GEMM_PROVIDER=native EXTRA_CFLAGS=-D_GNU_SOURCE"
            make $FLAGS                                 # builds lib + all test/demo binaries
            make test-unit $FLAGS AUTO_FETCH_MODEL=0    # run the model-free unit suite
          '

  # Cover the SHIPPED x86_64 path. release.yml builds linux-x86_64 (AVX-512/VNNI
  # cpu_x86 backend, runtime-dispatched via hw_probe over an x86-64-v3 baseline),
  # but the matrix above never tests x86_64 at all — an AVX-512 kernel bug would
  # ship unseen. This job builds + unit + int + e2e with the release backends on
  # a glibc x86_64 runner. GitHub runners don't guarantee AVX-512, so the CPU
  # feature check reports whether the AVX-512 kernels were actually exercised;
  # the runtime dispatch makes the run safe (AVX2/scalar fallback, no SIGILL)
  # either way, and build-test-x86_64-scalar below guarantees the SIMD-free path.
  build-test-x86_64:
    name: build + tests (Linux x86_64, cpu_x86 AVX-512 + scalar)
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v4
      - name: Report CPU features (was AVX-512 exercised on this runner?)
        run: |
          sed -n 's/^model name.*: //p' /proc/cpuinfo | head -1
          if grep -q avx512 /proc/cpuinfo; then
            echo "AVX-512: PRESENT -> the cpu_x86 AVX-512 kernels are exercised."
          else
            echo "AVX-512: ABSENT -> runtime dispatch falls back to AVX2/scalar (no SIGILL); AVX-512 kernels built but not run here."
          fi
      - name: ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-x86_64-${{ github.run_id }}
          restore-keys: ccache-x86_64-
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-14 ccache
      # Same backends/GEMM as the shipped release binary (release.yml linux-x86_64).
      - name: Build
        run: make TARGET=linux CC="ccache gcc-14" BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native
      - name: Unit tests
        run: make test-unit TARGET=linux CC="ccache gcc-14" BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native AUTO_FETCH_MODEL=0
      - name: Cache reference model
        uses: actions/cache@v4
        with:
          path: gguf_artifacts
          key: geist-model-gemma4-e2b-q4km-v1
      - name: Integration + e2e tests (real model)
        run: make test-int test-e2e TARGET=linux CC="ccache gcc-14" BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native
      # Portability gate (#96): GEIST_FORCE_ISA=avx2 clamps the kernel
      # dispatcher to the x86-64-v3 baseline, so the non-AVX512 code paths
      # (AVX2 Q4_Kx8 GEMV, scalar W8A8) run a real Q4_K prefill+decode even
      # when the runner CPU has AVX-512. Guards regressions where an AVX-512
      # kernel gets installed without a runtime CPU check (SIGILL on v3 CPUs).
      - name: Integration tests, non-AVX512 dispatch (GEIST_FORCE_ISA=avx2)
        run: GEIST_FORCE_ISA=avx2 make test-int TARGET=linux CC="ccache gcc-14" BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native

  # Guarantee the SIMD-free portable reference builds + passes on x86_64,
  # independent of whatever SIMD the runner CPU happens to have. This is the
  # baseline every other x86 kernel is checked against; if it drifts, quantized
  # correctness is unmoored.
  build-test-x86_64-scalar:
    name: build + unit tests (Linux x86_64, cpu_scalar portable reference)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-14
      - name: Build + unit tests (scalar only, no SIMD)
        run: |
          make TARGET=linux CC=gcc-14 BACKENDS="cpu_scalar" GEMM_PROVIDER=native
          make test-unit TARGET=linux CC=gcc-14 BACKENDS="cpu_scalar" GEMM_PROVIDER=native AUTO_FETCH_MODEL=0

  # musl on x86_64: build-test-musl above only covers arm64, but the SHIPPED
  # x86_64 release artifact is also musl-static. Build + unit-test the exact
  # release recipe so a musl-specific x86 issue can't reach a release.
  build-test-musl-x86_64:
    name: build + unit tests (Linux x86_64, musl)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Build + unit tests (musl in Alpine, cpu_x86 + scalar)
        run: |
          docker run --rm -v "$PWD:/src" -w /src alpine:3.21 sh -c '
            set -e
            apk add --no-cache build-base linux-headers bash
            make TARGET=linux CC=gcc BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native EXTRA_CFLAGS=-D_GNU_SOURCE
            make test-unit TARGET=linux CC=gcc BACKENDS="cpu_x86 cpu_scalar" GEMM_PROVIDER=native EXTRA_CFLAGS=-D_GNU_SOURCE AUTO_FETCH_MODEL=0
          '

  # AGENT.md requires the code to be ASan/UBSan-friendly; nothing enforced it.
  # Build MODE=asan (-fsanitize=address,undefined) and run the model-free unit
  # suite — catches use-after-free / overflow / UB in the kernels + engine the
  # unit tests exercise. UBSAN_OPTIONS=halt_on_error makes UB a hard failure
  # (UBSan only logs by default, which would pass CI); leak detection is off for
  # now (short-lived test binaries intentionally don't free at exit).
  asan:
    name: ASan + UBSan (Linux arm64)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    env:
      CCACHE_DIR: ${{ github.workspace }}/.ccache
      CCACHE_MAXSIZE: 500M
    steps:
      - uses: actions/checkout@v4
      - name: ccache
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-asan-${{ github.run_id }}
          restore-keys: ccache-asan-
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gcc-14 libopenblas-dev ccache
      - name: ASan/UBSan unit tests
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
          ASAN_OPTIONS: detect_leaks=0
        run: make MODE=asan test-unit TARGET=linux CC="ccache gcc-14" AUTO_FETCH_MODEL=0

  format:
    name: clang-format
    # ARM64 runner: `make format-check` auto-detects the target, and the linux
    # target $(error)s on x86_64 (kernels are NEON-only) before clang-format
    # even runs. aarch64 detects cleanly.
    runs-on: ubuntu-24.04-arm
    # Hard gate: the tree is clang-format-clean (clang-format 22.1.x), enforced.
    steps:
      - uses: actions/checkout@v4
      # Pin clang-format to the version the tree is formatted with — apt's
      # clang-format on ubuntu-24.04 is v18, which disagrees with the v22
      # formatting and would flag spurious drift. The pip package gives the
      # exact version on PATH (/usr/local/bin).
      - name: Install clang-format 22 (matches the tree)
        run: sudo python3 -m pip install --break-system-packages clang-format==22.1.5
      - name: Check formatting
        run: |
          clang-format --version
          make format-check
